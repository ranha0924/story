<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고사성어 이야기 — 한문 비주얼 노벨</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#2b2320; --ink-soft:#6a5d54; --paper:#f4ece0; --paper-2:#efe4d4;
    --line:#d8c8b2; --accent:#b5522f; --accent-soft:#e5c8b8; --gold:#a9822f;
    --good:#3f7d54; --bad:#b8503f; --shadow:0 10px 40px rgba(60,40,25,.18);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Noto Sans KR",sans-serif;color:var(--ink);
    background:radial-gradient(1200px 700px at 50% -10%,#fbf5ec,#e9dcc8);
    min-height:100vh;display:flex;justify-content:center;padding:26px 16px 60px}
  .wrap{width:100%;max-width:860px}
  .serif{font-family:"Gowun Batang",serif}
  .hanja{font-family:"Gowun Batang",serif}

  /* top bar */
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
  .brand{display:flex;align-items:center;gap:10px;cursor:pointer}
  .brand .mark{width:34px;height:34px;border-radius:9px;background:var(--accent);color:#fff;
    display:grid;place-items:center;font-family:"Gowun Batang",serif;font-size:20px}
  .brand b{font-weight:700;font-size:17px}
  .prog{font-size:13px;color:var(--ink-soft);display:flex;align-items:center;gap:8px}
  .prog .bar{width:120px;height:7px;border-radius:4px;background:var(--paper-2);overflow:hidden;border:1px solid var(--line)}
  .prog .fill{height:100%;background:var(--accent);width:0%}

  .card{background:var(--paper);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);overflow:hidden}

  /* home / cover */
  .cover{position:relative}
  .cover .img{aspect-ratio:16/9;width:100%;background-size:cover;background-position:center;
    background-color:#8a7355;background-image:linear-gradient(135deg,#a68a63,#7d6a52)}
  .cover .veil{position:absolute;inset:0;background:linear-gradient(180deg,rgba(30,20,12,.05),rgba(30,20,12,.55))}
  .cover .title{position:absolute;left:0;right:0;bottom:0;padding:26px 28px;color:#fdf6ea}
  .cover .title h1{font-family:"Gowun Batang",serif;font-size:34px;font-weight:700;letter-spacing:.5px}
  .cover .title p{font-size:15px;opacity:.9;margin-top:6px}
  .home-body{padding:20px 22px 26px}
  .home-body h2{font-family:"Gowun Batang",serif;font-size:19px;margin-bottom:4px}
  .home-body .sub{font-size:13.5px;color:var(--ink-soft);margin-bottom:16px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
  .tile{border:1px solid var(--line);border-radius:14px;background:var(--paper-2);
    padding:14px 14px 13px;cursor:pointer;transition:transform .12s,box-shadow .12s,border-color .12s;position:relative}
  .tile:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(80,55,30,.15);border-color:var(--accent-soft)}
  .tile .h{font-family:"Gowun Batang",serif;font-size:26px;letter-spacing:2px;color:var(--ink)}
  .tile .k{font-size:14px;color:var(--ink-soft);margin-top:3px}
  .tile .d{font-size:12.5px;color:var(--ink-soft);margin-top:9px;line-height:1.5;min-height:34px}
  .tile .done{position:absolute;top:11px;right:11px;font-size:11px;color:var(--good);
    border:1px solid var(--good);border-radius:20px;padding:2px 8px;opacity:0;font-weight:700}
  .tile.learned .done{opacity:1}
  .tile.learned{background:#eef3e8;border-color:#cfe0c0}

  .review-btn{margin-top:18px;display:flex;gap:10px;flex-wrap:wrap}
  .btn{font-family:"Noto Sans KR",sans-serif;font-size:14.5px;font-weight:500;cursor:pointer;
    border-radius:11px;padding:11px 18px;border:1px solid var(--line);background:#fff;color:var(--ink);
    transition:background .12s,transform .1s}
  .btn:hover{background:var(--paper-2)}
  .btn:active{transform:scale(.98)}
  .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn.primary:hover{background:#9c4426}
  .btn:disabled{opacity:.45;cursor:not-allowed}

  /* story / VN */
  .scene{position:relative;aspect-ratio:16/9;width:100%;background-size:cover;background-position:center;
    background-color:#cbb79a;display:flex;align-items:flex-end}
  .scene.ph{background-image:none !important}
  .ph-mark{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;
    color:#7d6a52;background:repeating-linear-gradient(45deg,#e7d8bf,#e7d8bf 14px,#e1d1b5 14px,#e1d1b5 28px)}
  .scene.ph .ph-mark{display:flex}
  .ph-mark .big{font-family:"Gowun Batang",serif;font-size:52px;letter-spacing:6px;color:#8a7355}
  .ph-mark .small{font-size:12px;margin-top:8px;opacity:.8}
  .dbox{position:relative;width:100%;background:linear-gradient(180deg,rgba(20,14,9,0),rgba(20,14,9,.62) 34%);
    padding:60px 26px 22px}
  .dbox .name{display:inline-block;font-size:12.5px;font-weight:700;color:#2b2320;background:var(--accent-soft);
    padding:3px 12px;border-radius:20px;margin-bottom:9px}
  .dbox .name.narr{background:#efe4d4}
  .dbox .line{font-family:"Gowun Batang",serif;font-size:19px;line-height:1.7;color:#fdf6ea;min-height:56px}
  .stage-foot{padding:16px 22px 20px;background:var(--paper);display:flex;flex-direction:column;gap:11px}
  .choice-q{font-size:14px;color:var(--ink-soft);margin-bottom:2px}
  .opt{text-align:left;font-family:"Gowun Batang",serif;font-size:16px;padding:13px 16px;border-radius:12px;
    border:1px solid var(--line);background:#fff;cursor:pointer;transition:border-color .12s,background .12s}
  .opt:hover{border-color:var(--accent);background:#fff7f2}
  .feedback{font-size:14.5px;color:var(--ink-soft);line-height:1.6;padding:2px 2px 0}
  .nav{display:flex;justify-content:space-between;align-items:center}
  .steps{display:flex;gap:6px}
  .steps i{width:22px;height:5px;border-radius:3px;background:var(--line);display:block}
  .steps i.on{background:var(--accent)}

  /* learn panel */
  .learn{padding:24px 24px 26px}
  .learn .top{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;border-bottom:1px solid var(--line);padding-bottom:14px;margin-bottom:16px}
  .learn .top .hj{font-family:"Gowun Batang",serif;font-size:40px;letter-spacing:4px}
  .learn .top .ko{font-size:17px;color:var(--ink-soft)}
  .learn .top .src{margin-left:auto;font-size:12.5px;color:var(--gold);border:1px solid var(--gold);border-radius:20px;padding:3px 11px}
  .chars{display:grid;grid-template-columns:repeat(auto-fit,minmax(96px,1fr));gap:10px;margin-bottom:18px}
  .ch{border:1px solid var(--line);border-radius:13px;background:var(--paper-2);padding:12px 8px;text-align:center}
  .ch .c{font-family:"Gowun Batang",serif;font-size:34px}
  .ch .hu{font-size:13px;color:var(--ink-soft);margin-top:6px}
  .block{margin-bottom:15px}
  .block .lab{font-size:12px;font-weight:700;color:var(--accent);letter-spacing:.5px;margin-bottom:5px}
  .block .txt{font-size:15px;line-height:1.7}
  .block.lit .txt{font-family:"Gowun Batang",serif}
  .learn-foot{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}

  /* quiz */
  .quiz{padding:24px 24px 28px}
  .quiz .qhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
  .quiz .qhead .t{font-family:"Gowun Batang",serif;font-size:18px}
  .quiz .qhead .c{font-size:13px;color:var(--ink-soft)}
  .qbody{background:var(--paper-2);border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:16px;min-height:96px}
  .qbody .qtype{font-size:12px;font-weight:700;color:var(--gold);margin-bottom:9px}
  .qbody .qtext{font-size:16.5px;line-height:1.6}
  .qbody .qbig{font-family:"Gowun Batang",serif;font-size:40px;letter-spacing:6px;text-align:center;padding:8px 0}
  .qopts{display:grid;gap:10px}
  .qopt{text-align:left;font-size:15.5px;padding:13px 16px;border-radius:12px;border:1px solid var(--line);
    background:#fff;cursor:pointer;transition:.12s;font-family:inherit}
  .qopt .hanja{font-family:"Gowun Batang",serif}
  .qopt:hover{border-color:var(--accent)}
  .qopt.right{background:#e7f2e5;border-color:var(--good);color:#2c5d3c}
  .qopt.wrong{background:#f7e6e2;border-color:var(--bad);color:#8a3729}
  .qopt.dim{opacity:.5}
  .qexp{font-size:14px;color:var(--ink-soft);margin-top:14px;line-height:1.6;display:none}
  .result{padding:34px 24px;text-align:center}
  .result .score{font-family:"Gowun Batang",serif;font-size:52px;color:var(--accent)}
  .result .msg{font-size:16px;margin:8px 0 22px;color:var(--ink-soft)}
  .hidden{display:none}
  .foot-note{text-align:center;font-size:12px;color:var(--ink-soft);margin-top:16px;line-height:1.6}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand" onclick="go('home')">
      <div class="mark hanja">文</div>
      <b>고사성어 이야기</b>
    </div>
    <div class="prog">
      <span id="progText">0 / 8 배움</span>
      <div class="bar"><div class="fill" id="progFill"></div></div>
    </div>
  </div>
  <div id="app"></div>
  <div class="foot-note">고1 한문 · 선택지로 읽는 고사성어 &nbsp;|&nbsp; 진도는 이 브라우저에 자동 저장돼요</div>
</div>

<script>

    script:[
      {img:1,s:"양혜왕",t:"나는 백성을 위해 애쓰는데 왜 이웃 나라보다 백성이 늘지 않소?"},
      {img:1,s:"맹자",t:"전쟁에 비유해 보겠습니다."},
      {img:1,n:1,t:"전투가 벌어지자, 겁먹은 병사들이 갑옷을 버리고 달아났다."},
      {img:1,n:1,t:"오십 보를 도망친 병사가, 백 보를 도망친 병사를 비웃었다."},

    script:[
      {img:1,n:1,t:"아흔 살 우공의 집 앞을, 두 개의 큰 산이 가로막고 있었다."},
      {img:1,s:"우공",t:"온 가족이 힘을 모아 이 산을 파서 옮기자!"},
      {img:1,s:"지수",t:"늙은 몸으로 언제 저 산을 다 옮기겠소? 어리석은 일이오."},

  {

      {img:2,n:1,t:"배가 멈추자 그는 자국 밑 물속을 뒤졌지만, 칼은 그곳에 없었다."},

    example:"발표 자료 끝에 핵심 한 줄을 넣어 화룡점정을 찍었다.",
    situation:"거의 완성된 그림에 마지막으로 눈동자를 그려 넣자 작품이 살아났다.",
    script:[
      {img:1,n:1,t:"화가 장승요가 절 벽에 용 네 마리를 그렸다. 그런데 눈동자만은 찍지 않았다."},
      {img:1,s:"구경꾼들",t:"어서 눈을 그려 넣으시오! 왜 비워 두는 것이오?"},
      {img:1,s:"장승요",t:"눈을 찍으면 용이 날아가 버릴 것이오."},

      {img:1,n:1,t:"잉어 한 마리가 물살을 거슬러 폭포에 도전했다."},

        {label:"끝까지 뛰어오른다",fb:"잉어는 온 힘을 다해 물살 위로 튀어올랐다."}
      ]},

/* ---------------- STATE ---------------- */
const KEY="gosaseongeo_progress_v1";
let learned = loadProgress();
let bestScore = loadBest();
let cur=null, step=0, answered=false, answeredFb="";

function loadProgress(){try{return new Set(JSON.parse(localStorage.getItem(KEY)||"[]"))}catch(e){return new Set()}}
function saveProgress(){try{localStorage.setItem(KEY,JSON.stringify([...learned]))}catch(e){}}
function loadBest(){try{return parseInt(localStorage.getItem(KEY+"_best")||"0",10)}catch(e){return 0}}
function saveBest(v){try{localStorage.setItem(KEY+"_best",String(v))}catch(e){}}

const app=()=>document.getElementById("app");
function imgPath(idiom,n){return "images/"+idiom.id+"_"+n+".png"}

function updateProg(){
  document.getElementById("progText").textContent=learned.size+" / "+IDIOMS.length+" 배움";
  document.getElementById("progFill").style.width=(learned.size/IDIOMS.length*100)+"%";
}

/* ---------------- ROUTER ---------------- */
function go(view,arg){
  window.scrollTo({top:0,behavior:"smooth"});
  if(view==="home") renderHome();
  else if(view==="story"){cur=IDIOMS[arg];step=0;answered=false;renderStory();}
  else if(view==="learn"){renderLearn();}
  else if(view==="quiz") startQuiz(arg);
  updateProg();
}

/* ---------------- HOME ---------------- */
function renderHome(){
  const tiles=IDIOMS.map((it,i)=>`
    <div class="tile ${learned.has(it.id)?'learned':''}" onclick="go('story',${i})">
      <div class="done">배움 ✓</div>
      <div class="h hanja">${it.hanja}</div>
      <div class="k">${it.ko}</div>
      <div class="d">${learned.has(it.id)?it.meaning.slice(0,38)+"…":"이야기로 만나기 →"}</div>
    </div>`).join("");
  const canQuiz=learned.size>0;
  app().innerHTML=`
    <div class="card cover">
      <div class="img" style="background-image:url('images/cover.png')"></div>
      <div class="veil"></div>
      <div class="title">
        <h1>고사성어, 이야기로 읽다</h1>
        <p>선택하며 읽는 여덟 편의 옛이야기 · 고1 한문</p>
      </div>
    </div>
    <div class="card" style="margin-top:16px">
      <div class="home-body">
        <h2>오늘의 이야기를 고르세요</h2>
        <div class="sub">이야기를 끝까지 읽으면 한자 풀이와 뜻이 열리고, ‘배움’ 표시가 붙어요.</div>
        <div class="grid">${tiles}</div>
        <div class="review-btn">
          <button class="btn primary" ${canQuiz?"":"disabled"} onclick="go('quiz','all')">종합 복습 퀴즈 ${canQuiz?"":"(먼저 하나 배우기)"}</button>
          ${bestScore?`<span style="align-self:center;font-size:13px;color:var(--ink-soft)">최고 기록 ${bestScore}점</span>`:""}
        </div>
      </div>
    </div>`;
}

/* ---------------- STORY (VN) ---------------- */
function renderStory(){
  const sc=cur.script[step];
  const total=cur.script.length;
  const dots=cur.script.map((_,i)=>`<i class="${i<=step?'on':''}"></i>`).join("");
  const path=imgPath(cur,sc.img);
  const name = sc.choice ? "" : (sc.s? `<span class="name">${sc.s}</span>` : `<span class="name narr">이야기</span>`);
  let footer="";
  if(sc.choice){
    if(!answered){
      footer=`<div class="choice-q">${sc.choice}</div>`+
        sc.opts.map((o,i)=>`<button class="opt" onclick="pick(${i})">${o.label}</button>`).join("");
    }else{
      footer=`<div class="feedback">${answeredFb}</div>
        <div class="nav" style="margin-top:6px"><div class="steps">${dots}</div>
        <button class="btn primary" onclick="next()">계속 →</button></div>`;
    }
  }else{
    const last = step===total-1;
    footer=`<div class="nav"><div class="steps">${dots}</div>
      <button class="btn primary" onclick="next()">${last?"이야기 마치기 →":"다음 →"}</button></div>`;
  }
  const lineHtml = sc.choice && !answered ? "" : `<div class="line serif">${sc.t||""}</div>`;
  app().innerHTML=`
    <div class="card">
      <div class="scene" style="background-image:url('${path}')" data-try="${path}">
        <div class="ph-mark"><div class="big hanja">${cur.hanja}</div><div class="small">${cur.ko} · 그림 자리 (${cur.id}_${sc.img}.png)</div></div>
        <div class="dbox">${name}${lineHtml}</div>
      </div>
      <div class="stage-foot">${footer}</div>
    </div>`;
  probeImg(cur,sc.img);
}
function pick(i){answered=true;answeredFb=cur.script[step].opts[i].fb;renderStory();}
function next(){
  if(step>=cur.script.length-1){ go('learn'); return; }
  step++; answered=false; renderStory();
}

/* background image existence probe → toggle placeholder */
function probeImg(idiom,n){
  const el=document.querySelector(".scene");
  if(!el) return;
  const src=imgPath(idiom,n);
  const test=new Image();
  test.onload=()=>{ el.classList.remove("ph"); el.style.backgroundImage="url('"+src+"')"; };
  test.onerror=()=>{ el.classList.add("ph"); el.style.backgroundImage="none"; };
  test.src=src;
}

/* ---------------- LEARN ---------------- */
function renderLearn(){
  const it=cur;
  learned.add(it.id); saveProgress();
  const chars=it.chars.map(c=>`<div class="ch"><div class="c hanja">${c[0]}</div><div class="hu">${c[1]}</div></div>`).join("");
  app().innerHTML=`
    <div class="card">
      <div class="learn">
        <div class="top">
          <div class="hj hanja">${it.hanja}</div>
          <div class="ko">${it.ko}</div>
          <div class="src hanja">出典 ${it.src}</div>
        </div>
        <div class="block"><div class="lab">한자 풀이</div></div>
        <div class="chars">${chars}</div>
        <div class="block lit"><div class="lab">겉뜻 (직역)</div><div class="txt">${it.literal}</div></div>
        <div class="block"><div class="lab">속뜻</div><div class="txt">${it.meaning}</div></div>
        <div class="block"><div class="lab">예문</div><div class="txt">“${it.example}”</div></div>
        <div class="learn-foot">
          <button class="btn primary" onclick="go('quiz','one')">이 성어 퀴즈 풀기</button>
          <button class="btn" onclick="go('home')">목록으로</button>
        </div>
      </div>
    </div>`;
  updateProg();
}

/* ---------------- QUIZ ---------------- */
let quizQs=[], qi=0, qScore=0, qMode="all";
const TYPES=["fill","meaning","situation","reading"];

function pool(){return IDIOMS.filter(it=>learned.has(it.id));}
function rand(a){return a[Math.floor(Math.random()*a.length)]}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function sample(arr,n,exclude){const s=shuffle(arr.filter(x=>x!==exclude));return s.slice(0,n)}

function makeQ(idiom,type){
  if(type==="reading"){
    const ch=rand(idiom.chars);
    const allHu=[...new Set(IDIOMS.flatMap(it=>it.chars.map(c=>c[1])))];
    const opts=shuffle([ch[1],...sample(allHu,3,ch[1])]);
    return {type:"한자 낱글자 음·훈",big:ch[0],text:"이 한자의 음과 훈으로 알맞은 것은?",
      opts,ans:opts.indexOf(ch[1]),exp:`${idiom.hanja}(${idiom.ko})의 ‘${ch[0]}’ — ${ch[1]}`,hanja:true};
  }
  if(type==="fill"){
    const arr=idiom.hanja.split("");
    const idx=Math.floor(Math.random()*arr.length);
    const answer=arr[idx];
    const shown=arr.map((c,i)=>i===idx?"◯":c).join("");
    const allCh=[...new Set(IDIOMS.flatMap(it=>it.hanja.split("")))];
    const opts=shuffle([answer,...sample(allCh,3,answer)]);
    return {type:"빈칸 성어 완성",big:shown,text:`◯에 들어갈 한자는? (${idiom.ko})`,
      opts,ans:opts.indexOf(answer),exp:`${idiom.hanja} — ‘${answer}’ ${idiom.chars.find(c=>c[0]===answer)?.[1]||""}`,hanja:true};
  }
  if(type==="meaning"){
    const opts=shuffle([idiom,...sample(IDIOMS,3,idiom)]);
    return {type:"뜻풀이 연결",text:idiom.meaning,
      opts:opts.map(o=>`${o.hanja} <span style="color:#8a7355">${o.ko}</span>`),
      ans:opts.indexOf(idiom),exp:`정답: ${idiom.hanja}(${idiom.ko})`,hanja:false};
  }
  // situation
  const opts=shuffle([idiom,...sample(IDIOMS,3,idiom)]);
  return {type:"상황에 맞는 성어 고르기",text:`상황: ${idiom.situation}`,
    opts:opts.map(o=>`${o.hanja} <span style="color:#8a7355">${o.ko}</span>`),
    ans:opts.indexOf(idiom),exp:`정답: ${idiom.hanja}(${idiom.ko}) — ${idiom.meaning}`,hanja:false};
}

function startQuiz(mode){
  qMode=mode; qi=0; qScore=0; quizQs=[];
  if(mode==="one"){
    const it=cur;
    quizQs=[makeQ(it,"reading"),makeQ(it,"fill"),makeQ(it,"meaning")];
  }else{
    const p=pool(); const n=Math.min(10,Math.max(3,p.length*2));
    for(let i=0;i<n;i++){quizQs.push(makeQ(rand(p),rand(TYPES)));}
  }
  renderQuiz();
}
function renderQuiz(){
  const q=quizQs[qi];
  const bigHtml=q.big?`<div class="qbig hanja">${q.big}</div>`:"";
  const opts=q.opts.map((o,i)=>`<button class="qopt ${q.hanja&&!q.big?'':''}" onclick="answerQ(${i})">${q.big?'<span class="hanja">'+o+'</span>':o}</button>`).join("");
  app().innerHTML=`
    <div class="card"><div class="quiz">
      <div class="qhead"><div class="t">${qMode==='one'?cur.ko+' 퀴즈':'종합 복습 퀴즈'}</div>
        <div class="c">${qi+1} / ${quizQs.length} · 점수 ${qScore}</div></div>
      <div class="qbody">
        <div class="qtype">${q.type}</div>
        ${bigHtml}
        <div class="qtext">${q.text}</div>
      </div>
      <div class="qopts" id="qopts">${opts}</div>
      <div class="qexp" id="qexp">${q.exp}</div>
      <div class="nav" style="margin-top:16px"><span></span>
        <button class="btn primary hidden" id="qnext" onclick="nextQ()">${qi<quizQs.length-1?'다음 문제 →':'결과 보기 →'}</button></div>
    </div></div>`;
}
function answerQ(i){
  const q=quizQs[qi];
  const btns=[...document.querySelectorAll("#qopts .qopt")];
  btns.forEach((b,idx)=>{b.onclick=null;
    if(idx===q.ans)b.classList.add("right");
    else if(idx===i)b.classList.add("wrong");
    else b.classList.add("dim");});
  if(i===q.ans)qScore++;
  document.getElementById("qexp").style.display="block";
  document.getElementById("qnext").classList.remove("hidden");
}
function nextQ(){
  if(qi<quizQs.length-1){qi++;renderQuiz();}
  else renderResult();
}
function renderResult(){
  const total=quizQs.length;
  const pct=Math.round(qScore/total*100);
  let msg = pct===100?"완벽해요! 다 맞혔어요.":pct>=70?"잘했어요! 조금만 더 다지면 돼요.":"괜찮아요. 이야기를 다시 읽고 도전해봐요.";
  if(qMode==="all" && qScore>bestScore){bestScore=qScore;saveBest(bestScore);msg="새 최고 기록! "+msg;}
  app().innerHTML=`
    <div class="card"><div class="result">
      <div class="score hanja">${qScore} / ${total}</div>
      <div class="msg">${msg}</div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <button class="btn primary" onclick="startQuiz('${qMode}')">다시 풀기</button>
        <button class="btn" onclick="go('home')">목록으로</button>
      </div>
    </div></div>`;
  updateProg();
}

/* ---------------- INIT ---------------- */
renderHome();updateProg();
</script>
