<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고사성어 이야기 — 한문 비주얼 노벨</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f7f3ec;        /* 종이 */
    --paper-dim:#efe9de;    /* 호버 톤 */
    --ink:#1c1a17;          /* 먹 */
    --ink-soft:#756c60;     /* 옅은 먹 */
    --line:#ddd5c7;         /* 헤어라인 */
    --line-soft:#e9e3d8;
    --vermilion:#a83c2b;    /* 주묵 — 아주 소량만 */
    --good:#4c6b52;         /* 저채도 초록 */
    --serif:"Noto Serif KR",serif;
    --sans:"Noto Sans KR",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{background:var(--paper)}
  body{font-family:var(--sans);font-size:15px;line-height:1.7;color:var(--ink);
    background:var(--paper);min-height:100vh;display:flex;justify-content:center;
    padding:44px 20px 96px;-webkit-font-smoothing:antialiased}
  .wrap{width:100%;max-width:880px}
  .serif{font-family:var(--serif)}
  .hanja{font-family:var(--serif)}
  button{font-family:var(--sans);color:inherit}
  :focus-visible{outline:2px solid var(--vermilion);outline-offset:2px}

  /* ---------- top bar ---------- */
  .topbar{display:flex;align-items:center;justify-content:space-between;
    padding-bottom:20px;margin-bottom:36px;border-bottom:1px solid var(--ink)}
  .brand{display:flex;align-items:center;gap:12px;cursor:pointer;background:none;border:none}
  .brand .mark{width:30px;height:30px;border-radius:4px;background:var(--vermilion);color:var(--paper);
    display:grid;place-items:center;font-family:var(--serif);font-size:17px;font-weight:600}
  .brand b{font-family:var(--serif);font-weight:600;font-size:16px;letter-spacing:.04em}
  .prog{font-size:12px;color:var(--ink-soft);display:flex;align-items:center;gap:12px;letter-spacing:.03em}
  .prog .bar{width:110px;height:2px;background:var(--line);overflow:hidden}
  .prog .fill{height:100%;background:var(--vermilion);width:0%;transition:width .25s ease}

  /* ---------- card ---------- */
  .card{background:var(--paper);border:1px solid var(--line);border-radius:8px;
    overflow:hidden;animation:appear .22s ease both}
  @keyframes appear{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){
    .card{animation:none}
    .prog .fill{transition:none}
  }

  /* ---------- cover (editorial) ---------- */
  .cover .img{position:relative;aspect-ratio:16/9;width:100%;
    background-size:cover;background-position:center;background-color:var(--paper-dim);
    border-bottom:1px solid var(--ink)}
  .vtitle{position:absolute;top:20px;right:20px;writing-mode:vertical-rl;
    font-family:var(--serif);font-weight:600;font-size:15px;letter-spacing:.42em;
    color:var(--ink);background:rgba(247,243,236,.88);padding:14px 7px;line-height:1}
  .cover-title{display:flex;align-items:flex-end;justify-content:space-between;
    gap:24px;padding:30px 34px 32px}
  .cover-title h1{font-family:var(--serif);font-weight:700;
    font-size:clamp(22px,3.6vw,30px);letter-spacing:.02em;line-height:1.4}
  .cover-title p{font-size:13px;color:var(--ink-soft);margin-top:8px;letter-spacing:.03em}
  .seal{flex:none;width:44px;height:44px;border-radius:4px;background:var(--vermilion);
    color:var(--paper);display:grid;place-items:center;
    font-family:var(--serif);font-size:22px;font-weight:600}

  /* ---------- home list ---------- */
  .home-body{padding:34px 34px 38px}
  .home-body h2{font-family:var(--serif);font-weight:600;font-size:18px;letter-spacing:.02em}
  .home-body .sub{font-size:13px;color:var(--ink-soft);margin:6px 0 28px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(176px,1fr));gap:14px}
  .tile{position:relative;text-align:left;border:1px solid var(--line-soft);border-radius:6px;
    background:var(--paper);padding:22px 18px 18px;cursor:pointer;
    transition:background-color .18s ease,border-color .18s ease}
  .tile:hover{background:var(--paper-dim);border-color:var(--line)}
  .tile .h{font-family:var(--serif);font-size:27px;font-weight:600;letter-spacing:.14em;color:var(--ink);line-height:1.35}
  .tile .k{font-size:13px;color:var(--ink-soft);margin-top:6px;letter-spacing:.02em}
  .tile .d{font-size:11.5px;color:var(--ink-soft);margin-top:14px;line-height:1.6;min-height:34px}
  .tile .done{position:absolute;top:14px;right:14px;font-size:10.5px;letter-spacing:.08em;
    color:var(--good);opacity:0}
  .tile.learned .done{opacity:1}
  .tile.learned .h{color:var(--ink)}
  .tile.learned{border-color:var(--line)}

  .review-btn{margin-top:32px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}

  /* ---------- buttons: line style ---------- */
  .btn{font-family:var(--sans);font-size:13.5px;font-weight:500;letter-spacing:.03em;cursor:pointer;
    border-radius:6px;padding:11px 22px;border:1px solid var(--line);background:transparent;color:var(--ink);
    transition:background-color .18s ease,border-color .18s ease}
  .btn:hover{background:var(--paper-dim);border-color:var(--ink-soft)}
  .btn.primary{border-color:var(--vermilion);color:var(--vermilion)}
  .btn.primary:hover{background:rgba(168,60,43,.07)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn:disabled:hover{background:transparent;border-color:var(--vermilion)}

  /* ---------- story / VN ---------- */
  .scene{position:relative;aspect-ratio:16/9;width:100%;background-size:cover;background-position:center;
    background-color:var(--paper-dim);display:flex;align-items:flex-end}
  .scene.ph{background-image:none !important}
  .ph-mark{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;
    color:var(--ink-soft);background:var(--paper-dim)}
  .scene.ph .ph-mark{display:flex}
  .ph-mark .big{font-family:var(--serif);font-size:52px;font-weight:600;letter-spacing:.2em;color:#cfc5b2}
  .ph-mark .small{font-size:11px;margin-top:12px;letter-spacing:.04em;opacity:.75}
  .dbox{position:relative;width:100%;
    background:linear-gradient(180deg,rgba(18,14,10,0),rgba(18,14,10,.5) 46%);
    padding:76px 34px 26px}
  .dbox .name{display:inline-block;font-size:11px;font-weight:500;letter-spacing:.14em;
    color:#f3ebdd;border:1px solid rgba(243,235,221,.55);border-radius:3px;
    padding:3px 10px;margin-bottom:12px}
  .dbox .name.narr{border-color:rgba(243,235,221,.3);color:rgba(243,235,221,.8)}
  .dbox .line{font-family:var(--serif);font-size:18px;line-height:1.8;color:#f7f1e5;min-height:60px;
    text-shadow:0 1px 8px rgba(18,14,10,.4)}
  .stage-foot{padding:22px 30px 26px;display:flex;flex-direction:column;gap:14px;border-top:1px solid var(--line-soft)}
  .choice-q{font-size:13px;color:var(--ink-soft);letter-spacing:.02em}
  .opt{text-align:left;font-family:var(--serif);font-size:15.5px;line-height:1.7;padding:15px 20px;
    border-radius:6px;border:1px solid var(--line);background:transparent;cursor:pointer;
    transition:background-color .18s ease,border-color .18s ease}
  .opt:hover{border-color:var(--ink-soft);background:var(--paper-dim)}
  .feedback{font-family:var(--serif);font-size:14.5px;color:var(--ink-soft);line-height:1.8;padding:2px 2px 0}
  .nav{display:flex;justify-content:space-between;align-items:center}
  .steps{display:flex;gap:7px}
  .steps i{width:20px;height:1px;background:var(--line);display:block}
  .steps i.on{background:var(--ink);height:2px}

  /* ---------- learn ---------- */
  .learn{padding:36px 36px 38px}
  .learn .top{display:flex;align-items:baseline;gap:16px;flex-wrap:wrap;
    border-bottom:1px solid var(--ink);padding-bottom:22px;margin-bottom:28px}
  .learn .top .hj{font-family:var(--serif);font-size:42px;font-weight:600;letter-spacing:.12em;line-height:1.3}
  .learn .top .ko{font-size:15px;color:var(--ink-soft);letter-spacing:.04em}
  .learn .top .src{margin-left:auto;font-family:var(--serif);font-size:12.5px;color:var(--ink-soft);letter-spacing:.08em}
  .chars{display:grid;grid-template-columns:repeat(auto-fit,minmax(92px,1fr));gap:12px;margin-bottom:30px}
  .ch{border:1px solid var(--line-soft);border-radius:6px;background:var(--paper);padding:16px 8px 14px;text-align:center}
  .ch .c{font-family:var(--serif);font-size:32px;font-weight:600;line-height:1.3}
  .ch .hu{font-size:12px;color:var(--ink-soft);margin-top:8px;letter-spacing:.02em}
  .block{margin-bottom:24px}
  .block .lab{font-size:11px;font-weight:700;color:var(--vermilion);letter-spacing:.18em;margin-bottom:7px}
  .block .txt{font-size:15px;line-height:1.8}
  .block.lit .txt{font-family:var(--serif)}
  .learn-foot{display:flex;gap:12px;flex-wrap:wrap;margin-top:34px}

  /* ---------- quiz ---------- */
  .quiz{padding:36px 36px 40px}
  .quiz .qhead{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:24px}
  .quiz .qhead .t{font-family:var(--serif);font-weight:600;font-size:17px;letter-spacing:.02em}
  .quiz .qhead .c{font-size:12px;color:var(--ink-soft);letter-spacing:.05em}
  .qbody{border-top:1px solid var(--ink);border-bottom:1px solid var(--line);
    padding:26px 4px;margin-bottom:24px;min-height:96px}
  .qbody .qtype{font-size:11px;font-weight:700;color:var(--vermilion);letter-spacing:.18em;margin-bottom:12px}
  .qbody .qtext{font-size:16px;line-height:1.8}
  .qbody .qbig{font-family:var(--serif);font-size:42px;font-weight:600;letter-spacing:.18em;text-align:center;padding:10px 0 14px}
  .qopts{display:grid;gap:12px}
  .qopt{text-align:left;font-size:15px;line-height:1.7;padding:14px 20px;border-radius:6px;
    border:1px solid var(--line);background:transparent;cursor:pointer;
    transition:background-color .18s ease,border-color .18s ease}
  .qopt .hanja{font-family:var(--serif)}
  .qopt:hover{border-color:var(--ink-soft);background:var(--paper-dim)}
  .qopt.right{border-color:var(--good);color:var(--good);background:rgba(76,107,82,.06)}
  .qopt.wrong{border-color:var(--vermilion);color:var(--vermilion);background:rgba(168,60,43,.05)}
  .qopt.dim{opacity:.45}
  .qexp{font-size:13.5px;color:var(--ink-soft);margin-top:18px;line-height:1.7;display:none}
  .result{padding:56px 36px 52px;text-align:center}
  .result .score{font-family:var(--serif);font-size:48px;font-weight:600;letter-spacing:.06em}
  .result .score::after{content:"";display:block;width:36px;height:2px;background:var(--vermilion);margin:18px auto 0}
  .result .msg{font-size:14.5px;margin:20px 0 34px;color:var(--ink-soft)}
  .hidden{display:none}

  .foot-note{text-align:center;font-size:11.5px;color:var(--ink-soft);margin-top:40px;
    line-height:1.7;letter-spacing:.03em}

  /* ---------- responsive ---------- */
  @media (max-width:560px){
    body{padding:28px 14px 72px}
    .topbar{margin-bottom:26px}
    .prog .bar{width:70px}
    .cover-title{padding:24px 22px 26px}
    .home-body{padding:26px 20px 30px}
    .grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
    .vtitle{top:12px;right:12px;font-size:13px;padding:10px 6px}
    .dbox{padding:56px 20px 20px}
    .dbox .line{font-size:16px}
    .stage-foot{padding:18px 20px 22px}
    .learn{padding:26px 20px 30px}
    .learn .top .hj{font-size:32px}
    .quiz{padding:26px 20px 30px}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand" onclick="go('home')">
      <div class="mark hanja">文</div>
      <b>고사성어 이야기</b>
    </div>
    <div class="prog">
      <span id="progText">0 / 8 배움</span>
      <div class="bar"><div class="fill" id="progFill"></div></div>
    </div>
  </div>
  <div id="app"></div>
  <div class="foot-note">고1 한문 · 선택지로 읽는 고사성어 &nbsp;|&nbsp; 진도는 이 브라우저에 자동 저장돼요</div>
</div>

<script>
/* ---------------- DATA ---------------- */
const IDIOMS = [
  {
    id:"saeongjima", hanja:"塞翁之馬", ko:"새옹지마", src:"淮南子",

      {img:1,s:"이웃",t:"저런… 그 좋은 말을 잃었으니 상심이 크시겠소."},
      {img:1,choice:"노인은 뭐라고 답할까?",opts:[
        {label:"“큰 손해요. 하늘이 나를 버렸소.”",fb:"그러나 노인은 그렇게 말하지 않았다. 아직 아무것도 끝나지 않았으니까."},

      {img:2,n:1,t:"화가 복이 되고 복이 다시 화가 되니, 인생은 참으로 알 수 없었다."}
    ]
  },
  {
    id:"ugongisan", hanja:"愚公移山", ko:"우공이산", src:"列子",

    script:[
      {img:1,n:1,t:"아흔 살 우공의 집 앞을, 두 개의 큰 산이 가로막고 있었다."},
      {img:2,s:"우공",t:"온 가족이 힘을 모아 이 산을 파서 옮기자!"},
      {img:2,s:"지수",t:"늙은 몸으로 언제 저 산을 다 옮기겠소? 어리석은 일이오."},
      {img:2,choice:"우공은 뭐라 답할까?",opts:[
        {label:"“그렇군, 포기하겠소.”",fb:"그러나 우공은 포기할 사람이 아니었다."},
        {label:"“내가 죽어도 자손이 이어가면 되오.”",fb:"우공의 눈빛은 단단했다. 대를 이어서라도."}

      {img:3,n:1,t:"쉬지 않는 우공의 꾸준함에 감동한 하늘이, 마침내 산을 옮겨 주었다."},
      {img:3,n:1,t:"멈추지 않는 노력 앞에 불가능은 없다는 이야기다."}
    ]
  },
  {
    id:"gakjugugeom", hanja:"刻舟求劍", ko:"각주구검", src:"呂氏春秋",

    script:[
      {img:1,n:1,t:"초나라 사람이 배를 타고 강을 건너다, 그만 칼을 물에 빠뜨렸다."},
      {img:2,n:1,t:"그는 서두르지 않고, 칼로 뱃전에 자국을 새겼다."},

      {img:2,choice:"이 방법, 통할까?",opts:[

      {img:3,n:1,t:"배가 멈추자 그는 자국 밑 물속을 뒤졌지만, 칼은 그곳에 없었다."},
      {img:3,n:1,t:"변한 상황을 모르고 옛 자리만 고집한 탓이었다."}
    ]
  },
  {
    id:"josammosa", hanja:"朝三暮四", ko:"조삼모사", src:"莊子",

    literal:"아침(朝)에 셋(三), 저녁(暮)에 넷(四)", meaning:"눈앞의 차이에 홀려 결과가 같음을 깨닫지 못함. 또는 간사한 꾀로 남을 속임.",
    example:"주는 방식만 바꿨을 뿐 총액은 같으니 조삼모사다.",
    situation:"‘아침 3개 저녁 4개’는 싫다더니, ‘아침 4개 저녁 3개’라니까 좋아한다.",
    script:[
      {img:1,n:1,t:"원숭이를 기르던 저공이, 먹이가 부족해지자 원숭이들에게 말했다."},
      {img:1,s:"저공",t:"도토리를 아침에 셋, 저녁에 넷 주겠다."},
      {img:1,n:1,t:"원숭이들이 적다며 화를 내고 펄쩍펄쩍 뛰었다."},
      {img:1,choice:"저공은 어떻게 할까?",opts:[
        {label:"“그럼 아침 넷, 저녁 셋 주마.”",fb:"원숭이들이 좋아서 날뛰었다. 하지만 총량은…"},
        {label:"먹이를 더 구해 온다",fb:"저공에겐 그럴 여유가 없었다. 대신 말만 바꿨다."}
      ]},
      {img:2,n:1,t:"아침 넷, 저녁 셋 — 하루 일곱 개로 총량은 똑같았지만 원숭이들은 만족했다."},

/* ---------------- STATE ---------------- */
const KEY="gosaseongeo_progress_v1";
let learned = loadProgress();
let bestScore = loadBest();
let cur=null, step=0, answered=false, answeredFb="";

function loadProgress(){try{return new Set(JSON.parse(localStorage.getItem(KEY)||"[]"))}catch(e){return new Set()}}
function saveProgress(){try{localStorage.setItem(KEY,JSON.stringify([...learned]))}catch(e){}}
function loadBest(){try{return parseInt(localStorage.getItem(KEY+"_best")||"0",10)}catch(e){return 0}}
function saveBest(v){try{localStorage.setItem(KEY+"_best",String(v))}catch(e){}}

const app=()=>document.getElementById("app");
function imgPath(idiom,n){return "images/"+idiom.id+"_"+n+".png"}

/* image preloading — 장면 전환이 즉시 보이도록 미리 받아둔다 */
const preloaded=new Set();
function preload(src){if(preloaded.has(src))return;preloaded.add(src);const i=new Image();i.src=src;}
function preloadStory(idiom){[...new Set(idiom.script.map(s=>s.img))].forEach(n=>preload(imgPath(idiom,n)));}

function updateProg(){
  document.getElementById("progText").textContent=learned.size+" / "+IDIOMS.length+" 배움";
  document.getElementById("progFill").style.width=(learned.size/IDIOMS.length*100)+"%";
}

/* ---------------- ROUTER ---------------- */
function go(view,arg){
  window.scrollTo({top:0,behavior:"smooth"});
  if(view==="home") renderHome();
  else if(view==="story"){cur=IDIOMS[arg];step=0;answered=false;preloadStory(cur);renderStory();}
  else if(view==="learn"){renderLearn();}
  else if(view==="quiz") startQuiz(arg);
  updateProg();
}

/* ---------------- HOME ---------------- */
function renderHome(){
  const tiles=IDIOMS.map((it,i)=>`
    <div class="tile ${learned.has(it.id)?'learned':''}" onclick="go('story',${i})">
      <div class="done">배움</div>
      <div class="h hanja">${it.hanja}</div>
      <div class="k">${it.ko}</div>
      <div class="d">${learned.has(it.id)?it.meaning.slice(0,38)+"…":"이야기로 만나기 →"}</div>
    </div>`).join("");
  const canQuiz=learned.size>0;
  app().innerHTML=`
    <div class="card cover">
      <div class="img" style="background-image:url('images/cover.png')">
        <span class="vtitle hanja">故事成語</span>
      </div>
      <div class="cover-title">
        <div>
          <h1>고사성어, 이야기로 읽다</h1>
          <p>선택하며 읽는 여덟 편의 옛이야기 · 고1 한문</p>
        </div>
        <span class="seal hanja">文</span>
      </div>
    </div>
    <div class="card" style="margin-top:24px">
      <div class="home-body">
        <h2>오늘의 이야기를 고르세요</h2>
        <div class="sub">이야기를 끝까지 읽으면 한자 풀이와 뜻이 열리고, ‘배움’ 표시가 붙어요.</div>
        <div class="grid">${tiles}</div>
        <div class="review-btn">
          <button class="btn primary" ${canQuiz?"":"disabled"} onclick="go('quiz','all')">종합 복습 퀴즈 ${canQuiz?"":"(먼저 하나 배우기)"}</button>
          ${bestScore?`<span style="align-self:center;font-size:12px;color:var(--ink-soft)">최고 기록 ${bestScore}점</span>`:""}
        </div>
      </div>
    </div>`;
}

/* ---------------- STORY (VN) ---------------- */
function renderStory(){
  const sc=cur.script[step];
  const total=cur.script.length;
  const dots=cur.script.map((_,i)=>`<i class="${i<=step?'on':''}"></i>`).join("");
  const path=imgPath(cur,sc.img);
  const name = sc.choice ? "" : (sc.s? `<span class="name">${sc.s}</span>` : `<span class="name narr">이야기</span>`);
  let footer="";
  if(sc.choice){
    if(!answered){
      footer=`<div class="choice-q">${sc.choice}</div>`+
        sc.opts.map((o,i)=>`<button class="opt" onclick="pick(${i})">${o.label}</button>`).join("");
    }else{
      footer=`<div class="feedback">${answeredFb}</div>
        <div class="nav" style="margin-top:6px"><div class="steps">${dots}</div>
        <button class="btn primary" onclick="next()">계속 →</button></div>`;
    }
  }else{
    const last = step===total-1;
    footer=`<div class="nav"><div class="steps">${dots}</div>
      <button class="btn primary" onclick="next()">${last?"이야기 마치기 →":"다음 →"}</button></div>`;
  }
  const lineHtml = sc.choice && !answered ? "" : `<div class="line serif">${sc.t||""}</div>`;
  app().innerHTML=`
    <div class="card">
      <div class="scene" style="background-image:url('${path}')" data-try="${path}">
        <div class="ph-mark"><div class="big hanja">${cur.hanja}</div><div class="small">${cur.ko} · 그림 자리 (${cur.id}_${sc.img}.png)</div></div>
        <div class="dbox">${name}${lineHtml}</div>
      </div>
      <div class="stage-foot">${footer}</div>
    </div>`;
  probeImg(cur,sc.img);
}
function pick(i){answered=true;answeredFb=cur.script[step].opts[i].fb;renderStory();}
function next(){
  if(step>=cur.script.length-1){ go('learn'); return; }
  step++; answered=false; renderStory();
}

/* background image existence probe → toggle placeholder */
function probeImg(idiom,n){
  const el=document.querySelector(".scene");
  if(!el) return;
  const src=imgPath(idiom,n);
  const test=new Image();
  test.onload=()=>{ el.classList.remove("ph"); el.style.backgroundImage="url('"+src+"')"; };
  test.onerror=()=>{ el.classList.add("ph"); el.style.backgroundImage="none"; };
  test.src=src;
}

/* ---------------- LEARN ---------------- */
function renderLearn(){
  const it=cur;
  learned.add(it.id); saveProgress();
  const chars=it.chars.map(c=>`<div class="ch"><div class="c hanja">${c[0]}</div><div class="hu">${c[1]}</div></div>`).join("");
  app().innerHTML=`
    <div class="card">
      <div class="learn">
        <div class="top">
          <div class="hj hanja">${it.hanja}</div>
          <div class="ko">${it.ko}</div>
          <div class="src hanja">出典 ${it.src}</div>
        </div>
        <div class="block"><div class="lab">한자 풀이</div></div>
        <div class="chars">${chars}</div>
        <div class="block lit"><div class="lab">겉뜻 (직역)</div><div class="txt">${it.literal}</div></div>
        <div class="block"><div class="lab">속뜻</div><div class="txt">${it.meaning}</div></div>
        <div class="block"><div class="lab">예문</div><div class="txt">“${it.example}”</div></div>
        <div class="learn-foot">
          <button class="btn primary" onclick="go('quiz','one')">이 성어 퀴즈 풀기</button>
          <button class="btn" onclick="go('home')">목록으로</button>
        </div>
      </div>
    </div>`;
  updateProg();
}

/* ---------------- QUIZ ---------------- */
let quizQs=[], qi=0, qScore=0, qMode="all";
const TYPES=["fill","meaning","situation","reading"];

function pool(){return IDIOMS.filter(it=>learned.has(it.id));}
function rand(a){return a[Math.floor(Math.random()*a.length)]}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function sample(arr,n,exclude){const s=shuffle(arr.filter(x=>x!==exclude));return s.slice(0,n)}

function makeQ(idiom,type){
  if(type==="reading"){
    const ch=rand(idiom.chars);
    const allHu=[...new Set(IDIOMS.flatMap(it=>it.chars.map(c=>c[1])))];
    const opts=shuffle([ch[1],...sample(allHu,3,ch[1])]);
    return {type:"한자 낱글자 음·훈",big:ch[0],text:"이 한자의 음과 훈으로 알맞은 것은?",
      opts,ans:opts.indexOf(ch[1]),exp:`${idiom.hanja}(${idiom.ko})의 ‘${ch[0]}’ — ${ch[1]}`,hanja:true};
  }
  if(type==="fill"){
    const arr=idiom.hanja.split("");
    const idx=Math.floor(Math.random()*arr.length);
    const answer=arr[idx];
    const shown=arr.map((c,i)=>i===idx?"◯":c).join("");
    const allCh=[...new Set(IDIOMS.flatMap(it=>it.hanja.split("")))];
    const opts=shuffle([answer,...sample(allCh,3,answer)]);
    return {type:"빈칸 성어 완성",big:shown,text:`◯에 들어갈 한자는? (${idiom.ko})`,
      opts,ans:opts.indexOf(answer),exp:`${idiom.hanja} — ‘${answer}’ ${idiom.chars.find(c=>c[0]===answer)?.[1]||""}`,hanja:true};
  }
  if(type==="meaning"){
    const opts=shuffle([idiom,...sample(IDIOMS,3,idiom)]);
    return {type:"뜻풀이 연결",text:idiom.meaning,
      opts:opts.map(o=>`${o.hanja} <span style="color:var(--ink-soft)">${o.ko}</span>`),
      ans:opts.indexOf(idiom),exp:`정답: ${idiom.hanja}(${idiom.ko})`,hanja:false};
  }
  // situation
  const opts=shuffle([idiom,...sample(IDIOMS,3,idiom)]);
  return {type:"상황에 맞는 성어 고르기",text:`상황: ${idiom.situation}`,
    opts:opts.map(o=>`${o.hanja} <span style="color:var(--ink-soft)">${o.ko}</span>`),
    ans:opts.indexOf(idiom),exp:`정답: ${idiom.hanja}(${idiom.ko}) — ${idiom.meaning}`,hanja:false};
}

function startQuiz(mode){
  qMode=mode; qi=0; qScore=0; quizQs=[];
  if(mode==="one"){
    const it=cur;
    quizQs=[makeQ(it,"reading"),makeQ(it,"fill"),makeQ(it,"meaning")];
  }else{
    const p=pool(); const n=Math.min(10,Math.max(3,p.length*2));
    for(let i=0;i<n;i++){quizQs.push(makeQ(rand(p),rand(TYPES)));}
  }
  renderQuiz();
}
function renderQuiz(){
  const q=quizQs[qi];
  const bigHtml=q.big?`<div class="qbig hanja">${q.big}</div>`:"";
  const opts=q.opts.map((o,i)=>`<button class="qopt ${q.hanja&&!q.big?'':''}" onclick="answerQ(${i})">${q.big?'<span class="hanja">'+o+'</span>':o}</button>`).join("");
  app().innerHTML=`
    <div class="card"><div class="quiz">
      <div class="qhead"><div class="t">${qMode==='one'?cur.ko+' 퀴즈':'종합 복습 퀴즈'}</div>
        <div class="c">${qi+1} / ${quizQs.length} · 점수 ${qScore}</div></div>
      <div class="qbody">
        <div class="qtype">${q.type}</div>
        ${bigHtml}
        <div class="qtext">${q.text}</div>
      </div>
      <div class="qopts" id="qopts">${opts}</div>
      <div class="qexp" id="qexp">${q.exp}</div>
      <div class="nav" style="margin-top:20px"><span></span>
        <button class="btn primary hidden" id="qnext" onclick="nextQ()">${qi<quizQs.length-1?'다음 문제 →':'결과 보기 →'}</button></div>
    </div></div>`;
}
function answerQ(i){
  const q=quizQs[qi];
  const btns=[...document.querySelectorAll("#qopts .qopt")];
  btns.forEach((b,idx)=>{b.onclick=null;
    if(idx===q.ans)b.classList.add("right");
    else if(idx===i)b.classList.add("wrong");
    else b.classList.add("dim");});
  if(i===q.ans)qScore++;
  document.getElementById("qexp").style.display="block";
  document.getElementById("qnext").classList.remove("hidden");
}
function nextQ(){
  if(qi<quizQs.length-1){qi++;renderQuiz();}
  else renderResult();
}
function renderResult(){
  const total=quizQs.length;
  const pct=Math.round(qScore/total*100);
  let msg = pct===100?"완벽해요! 다 맞혔어요.":pct>=70?"잘했어요! 조금만 더 다지면 돼요.":"괜찮아요. 이야기를 다시 읽고 도전해봐요.";
  if(qMode==="all" && qScore>bestScore){bestScore=qScore;saveBest(bestScore);msg="새 최고 기록! "+msg;}
  app().innerHTML=`
    <div class="card"><div class="result">
      <div class="score hanja">${qScore} / ${total}</div>
      <div class="msg">${msg}</div>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
        <button class="btn primary" onclick="startQuiz('${qMode}')">다시 풀기</button>
        <button class="btn" onclick="go('home')">목록으로</button>
      </div>
    </div></div>`;
  updateProg();
}

/* ---------------- INIT ---------------- */
renderHome();updateProg();
/* 첫 화면이 뜬 뒤 한가할 때, 각 이야기의 첫 장면 그림을 미리 받아둔다 */
(window.requestIdleCallback||function(f){setTimeout(f,1200)})(function(){
  IDIOMS.forEach(it=>preload(imgPath(it,1)));
});
</script>
